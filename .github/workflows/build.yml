name: Build LaTeX and publish PDF

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
    paths:
      - 'article/**'
      - '**/*.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Set up LaTeX environment
        uses: TeX-Live/setup-texlive-action@v3
        with:
          cache: true
          packages: |
            scheme-medium
            makecell

      - name: Build LaTeX
        working-directory: article
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error article.tex

      - name: Publish PDF as release asset
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: article/article.pdf
